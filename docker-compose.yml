services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_URL: "${NEXT_PUBLIC_URL:-http://localhost:3000}"
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}"
        NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5000/api}"
    image: spiritual-retreat-front-end:latest
    container_name: spiritual-retreat-front-end
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      API_URL: "${API_URL_INTERNAL:-http://host.docker.internal:5000/api}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT:-3000}:3000"
