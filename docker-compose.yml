services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: spiritual-retreat-front-end:latest
    container_name: spiritual-retreat-front-end
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "${PORT:-3000}:3000"
